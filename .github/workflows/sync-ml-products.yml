name: Sync ML Products to Supabase

on:
  schedule:
    # Corre a las 6:00 UTC todos los dias (3am Argentina)
    - cron: '0 6 * * *'
  # Permite ejecutarlo manualmente desde GitHub Actions → Run workflow
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Sync productos ML → Supabase
        run: node scripts/sync-ml-products.mjs
        env:
          ML_REFRESH_TOKEN:      ${{ secrets.ML_REFRESH_TOKEN }}
          ML_APP_ID:             ${{ secrets.ML_APP_ID }}
          ML_APP_SECRET:         ${{ secrets.ML_APP_SECRET }}
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}
          ML_AFFILIATE_TEMPLATE: ${{ secrets.ML_AFFILIATE_TEMPLATE }}
