name: Check ML Products Status

# Corre diariamente y revisa si cada producto activo en beneficios_productos
# sigue existiendo/activo en Mercado Libre. Si esta pausado, cerrado o la
# publicacion fue eliminada, lo desactiva (active=false) del catalogo.
#
# En cada ejecucion envia un email de resumen (total revisados, activos,
# inactivos y el listado de los inactivos) usando Resend, si estan
# configurados los secrets RESEND_API_KEY y ADMIN_NOTIFICATION_EMAIL.
#
# Nota: si ML bloquea las consultas (403) para mas del 50% de los productos,
# el script no desactiva nada para evitar apagar el catalogo entero por un
# bloqueo temporal de IP — revisar el log del job si eso ocurre.

on:
  schedule:
    # 07:00 UTC todos los dias (4am Argentina)
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  check-status:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Verificar estado de productos en ML
        run: node scripts/check-ml-products-status.mjs
        env:
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY:        ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM:            ${{ secrets.EMAIL_FROM }}
          ADMIN_NOTIFICATION_EMAIL: ${{ secrets.ADMIN_NOTIFICATION_EMAIL }}
